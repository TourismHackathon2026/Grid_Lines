name: tourism_tracking_app
description: Tourism Tracking Application

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Networking
  dio: ^5.8.0+1
  http: ^1.3.0
  retrofit: ^4.4.2

  # Dependency Injection
  get_it: ^8.0.3

  injectable: ^2.5.0

  # Models
  freezed_annotation: ^2.4.4

  json_annotation: ^4.9.0

  equatable: ^2.0.7

  # UI
  google_fonts: ^6.3.0

  flutter_svg: ^2.2.0

  cached_network_image: ^3.4.1

  fl_chart: ^1.0.0

  # Storage
  shared_preferences: ^2.5.3

  # Maps
  google_maps_flutter: ^2.12.3

  geolocator: ^14.0.2

  permission_handler: ^12.0.1

  # Utils
  intl: ^0.20.2

  logger: ^2.6.1

  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4

  freezed: ^2.5.8

  json_serializable: ^6.9.5

  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/